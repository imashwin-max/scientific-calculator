<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcX — Scientific Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --panel:     #1a1a28;
      --border:    #2a2a3f;
      --accent:    #7c6cfc;
      --accent2:   #fc6c8f;
      --text:      #e8e6ff;
      --muted:     #6b6a8a;
      --num:       #1e1e2e;
      --num-h:     #282840;
      --op:        #1c1c30;
      --op-h:      #2a2a48;
      --fn:        #161624;
      --fn-h:      #22223a;
      --eq:        #7c6cfc;
      --eq-h:      #9180ff;
      --clear:     #2a1a2a;
      --clear-h:   #3a2038;
      --radius:    14px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(124,108,252,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .mode-toggle {
      display: flex;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Display */
    .display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px 16px;
      position: relative;
      overflow: hidden;
    }
    .display::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }
    .expression {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      text-align: right;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 40px;
      font-weight: 300;
      text-align: right;
      color: var(--text);
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.1s;
      letter-spacing: -1px;
    }
    .result.small { font-size: 28px; }
    .result.error { color: var(--accent2); font-size: 22px; }

    /* History */
    .history-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .history-panel.open { max-height: 180px; }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .history-header span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .history-clear {
      font-size: 11px;
      color: var(--accent2);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
    }
    .history-list {
      overflow-y: auto;
      max-height: 130px;
      padding: 8px 0;
    }
    .history-item {
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
      margin: 0 4px;
    }
    .history-item:hover { background: var(--panel); }
    .history-item .h-expr {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .history-item .h-result {
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      font-weight: 500;
    }
    .history-empty {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px;
    }

    /* Keypad */
    .keypad {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Scientific row */
    .sci-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
      margin-bottom: 0;
    }
    .sci-row.visible {
      max-height: 120px;
      opacity: 1;
      margin-bottom: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    /* Buttons */
    button.key {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      height: 62px;
      transition: transform 0.08s, background 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
      letter-spacing: -0.2px;
    }
    button.key:active {
      transform: scale(0.93);
    }
    button.key::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: inherit;
    }
    button.key:active::after { opacity: 0.06; }

    /* Button types */
    .key-num    { background: var(--num);   color: var(--text); }
    .key-num:hover { background: var(--num-h); }

    .key-op     { background: var(--op);    color: #a89cff; font-size: 20px; }
    .key-op:hover { background: var(--op-h); }

    .key-fn     { background: var(--fn);    color: #8899cc; font-size: 13px; font-weight: 600; }
    .key-fn:hover { background: var(--fn-h); }

    .key-eq     { background: var(--eq);    color: #fff; font-size: 22px; box-shadow: 0 4px 20px rgba(124,108,252,0.3); }
    .key-eq:hover { background: var(--eq-h); box-shadow: 0 4px 24px rgba(124,108,252,0.45); }

    .key-clear  { background: var(--clear); color: var(--accent2); font-size: 14px; font-weight: 600; }
    .key-clear:hover { background: var(--clear-h); }

    .key-zero   { grid-column: span 2; }
    .key-sub { font-size: 22px; }

    /* Sci grid buttons */
    .sci-row button.key {
      height: 46px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 0 4px;
      justify-content: space-between;
    }
    .history-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .keyboard-hint {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Pressed animation */
    @keyframes flash {
      0%   { background: rgba(124,108,252,0.2); }
      100% { background: transparent; }
    }
    .key.flash { animation: flash 0.15s ease-out; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 400px) {
      .result { font-size: 32px; }
      button.key { height: 54px; font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="logo">CalcX</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-basic" onclick="setMode('basic')">Basic</button>
      <button class="mode-btn" id="btn-sci" onclick="setMode('sci')">Scientific</button>
    </div>
  </div>

  <!-- Display -->
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <!-- History -->
  <div class="history-panel" id="history-panel">
    <div class="history-header">
      <span>History</span>
      <button class="history-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No calculations yet</div>
    </div>
  </div>

  <!-- Keypad -->
  <div class="keypad">

    <!-- Scientific functions -->
    <div class="sci-row" id="sci-row">
      <button class="key key-fn" onclick="inputFn('sin(')">sin</button>
      <button class="key key-fn" onclick="inputFn('cos(')">cos</button>
      <button class="key key-fn" onclick="inputFn('tan(')">tan</button>
      <button class="key key-fn" onclick="inputFn('log(')">log</button>
      <button class="key key-fn" onclick="inputFn('ln(')">ln</button>
      <button class="key key-fn" onclick="inputFn('sqrt(')">√x</button>
      <button class="key key-fn" onclick="inputFn('**2')">x²</button>
      <button class="key key-fn" onclick="inputFn('**')">xⁿ</button>
      <button class="key key-fn" onclick="inputVal('Math.PI')">π</button>
      <button class="key key-fn" onclick="inputVal('Math.E')">e</button>
    </div>

    <!-- Main grid -->
    <div class="grid">
      <button class="key key-clear" onclick="clearAll()">AC</button>
      <button class="key key-clear" onclick="toggleSign()">+/−</button>
      <button class="key key-clear" onclick="percent()">%</button>
      <button class="key key-op"    onclick="inputOp('/')">÷</button>

      <button class="key key-num"   onclick="inputNum('7')">7</button>
      <button class="key key-num"   onclick="inputNum('8')">8</button>
      <button class="key key-num"   onclick="inputNum('9')">9</button>
      <button class="key key-op"    onclick="inputOp('*')">×</button>

      <button class="key key-num"   onclick="inputNum('4')">4</button>
      <button class="key key-num"   onclick="inputNum('5')">5</button>
      <button class="key key-num"   onclick="inputNum('6')">6</button>
      <button class="key key-op key-sub" onclick="inputOp('-')">−</button>

      <button class="key key-num"   onclick="inputNum('1')">1</button>
      <button class="key key-num"   onclick="inputNum('2')">2</button>
      <button class="key key-num"   onclick="inputNum('3')">3</button>
      <button class="key key-op"    onclick="inputOp('+')">+</button>

      <button class="key key-num key-zero" onclick="inputNum('0')">0</button>
      <button class="key key-num"   onclick="inputDot()">.</button>
      <button class="key key-eq"    onclick="calculate()">=</button>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-row">
    <button class="history-toggle" onclick="toggleHistory()">
      <span>⟳</span> History
    </button>
    <button class="history-toggle" onclick="backspace()" style="gap:4px">
      ⌫ Delete
    </button>
    <span class="keyboard-hint">Keyboard ready</span>
  </div>

</div>

<script>
  let expr = '';
  let justCalc = false;
  let history = [];
  let sciMode = false;
  let histOpen = false;

  const resultEl   = document.getElementById('result');
  const exprEl     = document.getElementById('expression');
  const sciRow     = document.getElementById('sci-row');
  const histPanel  = document.getElementById('history-panel');
  const histList   = document.getElementById('history-list');

  function setMode(m) {
    sciMode = m === 'sci';
    document.getElementById('btn-basic').classList.toggle('active', !sciMode);
    document.getElementById('btn-sci').classList.toggle('active', sciMode);
    sciRow.classList.toggle('visible', sciMode);
  }

  function updateDisplay(val, expStr) {
    const s = String(val);
    resultEl.className = 'result';
    if (s.length > 14) resultEl.classList.add('small');
    if (val === 'Error') resultEl.classList.add('error');
    resultEl.textContent = s;
    exprEl.textContent = expStr || '';
  }

  function inputNum(n) {
    if (justCalc) { expr = ''; justCalc = false; }
    expr += n;
    updateDisplay(formatExpr(expr), '');
  }

  function inputOp(op) {
    justCalc = false;
    if (expr && /[\+\-\*\/]$/.test(expr)) expr = expr.slice(0, -1);
    expr += op;
    updateDisplay(formatExpr(expr), '');
  }

  function inputFn(fn) {
    if (justCalc) { justCalc = false; }
    if (fn === '**2') { expr += '**2'; }
    else if (fn === '**') { expr += '**'; }
    else { expr += fn; }
    updateDisplay(formatExpr(expr), '');
  }

  function inputVal(v) {
    if (justCalc) { expr = ''; justCalc = false; }
    if (v === 'Math.PI') expr += 'Math.PI';
    else if (v === 'Math.E') expr += 'Math.E';
    updateDisplay(formatExpr(expr), '');
  }

  function inputDot() {
    if (justCalc) { expr = '0'; justCalc = false; }
    const parts = expr.split(/[\+\-\*\/\(]/);
    const last = parts[parts.length - 1];
    if (last.includes('.')) return;
    if (!last || /[\+\-\*\/]$/.test(expr)) expr += '0';
    expr += '.';
    updateDisplay(formatExpr(expr), '');
  }

  function formatExpr(e) {
    return e
      .replace(/Math\.PI/g, 'π')
      .replace(/Math\.E/g, 'e')
      .replace(/sqrt\(/g, '√(')
      .replace(/\*\*/g, '^')
      .replace(/\*/g, '×')
      .replace(/\//g, '÷');
  }

  function calculate() {
    if (!expr) return;
    const raw = expr;
    try {
      let evalExpr = expr
        .replace(/sin\(/g, 'Math.sin(')
        .replace(/cos\(/g, 'Math.cos(')
        .replace(/tan\(/g, 'Math.tan(')
        .replace(/log\(/g, 'Math.log10(')
        .replace(/ln\(/g, 'Math.log(')
        .replace(/sqrt\(/g, 'Math.sqrt(');

      // Auto-close open parens
      const opens = (evalExpr.match(/\(/g) || []).length;
      const closes = (evalExpr.match(/\)/g) || []).length;
      evalExpr += ')'.repeat(Math.max(0, opens - closes));

      // eslint-disable-next-line no-new-func
      let result = Function('"use strict"; return (' + evalExpr + ')')();
      if (!isFinite(result)) throw new Error('Infinity');

      result = parseFloat(result.toPrecision(12));
      const display = Number.isInteger(result) ? result : result;

      addHistory(formatExpr(raw), display);
      exprEl.textContent = formatExpr(raw) + ' =';
      resultEl.className = 'result';
      if (String(display).length > 14) resultEl.classList.add('small');
      resultEl.textContent = display;
      expr = String(display);
      justCalc = true;
    } catch {
      updateDisplay('Error', formatExpr(raw));
      expr = '';
      justCalc = true;
    }
  }

  function clearAll() {
    expr = '';
    justCalc = false;
    updateDisplay('0', '');
  }

  function backspace() {
    if (justCalc) { clearAll(); return; }
    // Handle multi-char tokens
    if (expr.endsWith('Math.PI')) expr = expr.slice(0, -7);
    else if (expr.endsWith('Math.E')) expr = expr.slice(0, -6);
    else expr = expr.slice(0, -1);
    updateDisplay(expr ? formatExpr(expr) : '0', '');
  }

  function toggleSign() {
    if (!expr || expr === '0') return;
    if (expr.startsWith('-')) expr = expr.slice(1);
    else expr = '-' + expr;
    updateDisplay(formatExpr(expr), '');
  }

  function percent() {
    if (!expr) return;
    try {
      // eslint-disable-next-line no-new-func
      const val = Function('"use strict"; return (' + expr + ')')();
      expr = String(val / 100);
      updateDisplay(expr, '');
    } catch {}
  }

  // History
  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 20) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      histList.innerHTML = '<div class="history-empty">No calculations yet</div>';
      return;
    }
    histList.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="loadHistory(${i})">
        <div class="h-expr">${h.expr}</div>
        <div class="h-result">${h.result}</div>
      </div>
    `).join('');
  }

  function loadHistory(i) {
    expr = String(history[i].result);
    justCalc = true;
    updateDisplay(expr, history[i].expr + ' =');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function toggleHistory() {
    histOpen = !histOpen;
    histPanel.classList.toggle('open', histOpen);
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === '.') inputDot();
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
